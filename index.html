<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jieon Sim · Portfolio</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231C1B1A'/><circle cx='16' cy='16' r='3' fill='white'/></svg>" />

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Pretendard', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          mono: ['Pretendard', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
        },
        colors: {
          neutral: {
            50:  '#FAFAF9', 100: '#F4F4F2', 200: '#E7E5E0', 300: '#D9D7D1',
            400: '#9C9893', 500: '#6B6862', 600: '#4A4844', 700: '#2F2E2C',
            800: '#1C1B1A', 900: '#141312',
          },
          accent: { DEFAULT: '#7D6F5A', soft: '#EBE7DD', ink: '#5A4F3E' },
        },
      },
    },
  };
</script>

<style>
  :root {
    --bg:        #FAFAF9;
    --surface:   #FFFFFF;
    --soft:      #F4F4F2;
    --border:        #E7E5E0;
    --border-strong: #D9D7D1;
    --text-primary:   #1C1B1A;
    --text-secondary: #6B6862;
    --text-tertiary:  #9C9893;
    --accent:      #7D6F5A;
    --accent-soft: #EBE7DD;
    --accent-ink:  #5A4F3E;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text-primary); }
  body {
    font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .mono { font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }

  @keyframes lineUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .line-up { opacity: 0; animation: lineUp 600ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  .card-hover { transition: border-color 200ms ease-out, transform 200ms ease-out, box-shadow 200ms ease-out; }
  .card-hover:hover { border-color: var(--accent); }
  .lift-hover { transition: transform 220ms ease-out, border-color 220ms ease-out, box-shadow 220ms ease-out; }
  .lift-hover:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 1px 2px rgba(28,27,26,0.04); }

  .wf-node-inner {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color 200ms ease-out;
    line-height: 1.35;
  }
  .wf-node-inner:hover { border-color: var(--border-strong); }
  .wf-node-inner.dark { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  .wf-title { font-weight: 600; font-size: 13px; color: var(--text-primary); }
  .wf-sub   { font-size: 12px; color: var(--text-tertiary); }

  .quote { border-left: 1px solid var(--border-strong); padding-left: 24px; }
  .quote-accent { border-left: 4px solid var(--accent); padding-left: 24px; }

  .nav-scrolled {
    background: rgba(250, 250, 249, 0.78);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--border);
  }

  ::selection { background: var(--text-primary); color: #fff; }
  section[id] { scroll-margin-top: 72px; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  /* Case Study — editorial chapter layout */
  .cs-num {
    font-weight: 500; font-size: 24px; letter-spacing: -0.02em;
    line-height: 1; color: var(--accent); font-variant-numeric: tabular-nums;
    display: block; margin-bottom: 8px;
  }
  @media (min-width: 768px) { .cs-num { font-size: 28px; } }
  .cs-label {
    font-weight: 600; font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-tertiary);
    display: block; margin-bottom: 22px;
  }
  .cs-approach {
    font-size: 15px; line-height: 1.75; color: var(--text-primary);
    max-width: 760px; text-wrap: pretty; white-space: pre-line;
  }
  .cs-result { display: flex; flex-direction: column; gap: 12px; }
  .cs-result li {
    font-size: 15px; line-height: 1.75; color: var(--text-primary);
    display: flex; gap: 14px; align-items: flex-start;
  }
  .cs-result li::before {
    content: ''; flex-shrink: 0; width: 5px; height: 5px;
    margin-top: 11px; border-radius: 999px; background: var(--accent);
  }

  /* Pattern A — label/value rows */
  .lv-row { display: grid; grid-template-columns: 130px 1fr; gap: 16px; align-items: baseline; padding: 8px 0; }
  .lv-row .lv-label { color: var(--text-tertiary); font-size: 13.5px; letter-spacing: 0.02em; }
  .lv-row .lv-value { color: var(--text-primary); font-size: 15.5px; line-height: 1.65; }
  @media (max-width: 640px) {
    .lv-row { grid-template-columns: 1fr; gap: 4px; padding: 6px 0; }
  }

  /* Pattern C — numbered steps (subtle, gray label) */
  .step-row { display: grid; grid-template-columns: 36px 1fr; gap: 16px; align-items: baseline; }
  .step-row + .step-row { margin-top: 22px; }
  .step-row .step-num {
    color: var(--text-tertiary);
    font-weight: 500;
    font-size: 12.5px;
    letter-spacing: 0.10em;
    line-height: 1.5;
    font-variant-numeric: tabular-nums;
    padding-top: 1px;
  }
  .step-row .step-title { font-size: 15.5px; font-weight: 600; color: var(--text-primary); line-height: 1.45; letter-spacing: -0.005em; }
  .step-row .step-desc  { font-size: 14px; color: var(--text-secondary); margin-top: 4px; line-height: 1.7; }

  /* ROLE chip card */
  .role-card {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 18px 20px;
    transition: border-color 200ms ease-out, transform 200ms ease-out;
  }
  .role-card:hover { border-color: var(--accent); }
  .role-card .role-num { color: var(--accent); font-weight: 600; font-size: 12px; letter-spacing: 0.08em; margin-bottom: 10px; display: block; }
  .role-card .role-title { color: var(--text-primary); font-size: 14.5px; font-weight: 600; line-height: 1.4; letter-spacing: -0.005em; }
  .role-card .role-sep { width: 24px; height: 1px; background: var(--border-strong); margin: 12px 0; }
  .role-card .role-desc { color: var(--text-secondary); font-size: 13.5px; line-height: 1.6; }

  .kw-chip {
    display: inline-block;
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
  }

  @media (max-width: 640px) {
    .nav-links a { font-size: 12px; }
  }
</style>
</head>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ===== Top Nav ===== */
function TopNav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const links = [['About', '#about'], ['Career', '#career'], ['Projects', '#projects'], ['Contact', '#contact']];
  return (
    <header className={`fixed top-0 inset-x-0 z-50 transition-all duration-200 ${scrolled ? 'nav-scrolled' : ''}`}>
      <div className="max-w-[1180px] mx-auto px-6 md:px-10 h-14 flex items-center justify-between">
        <a href="#top" className="font-semibold tracking-tight text-[15px]" style={{ color: 'var(--text-primary)' }}>Jieon Sim</a>
        <nav className="nav-links flex items-center gap-6 md:gap-8">
          {links.map(([label, href]) => (
            <a key={href} href={href} className="text-[13px] md:text-[14px] transition-colors duration-200"
               style={{ color: 'var(--text-secondary)' }}
               onMouseEnter={(e) => (e.currentTarget.style.color = 'var(--text-primary)')}
               onMouseLeave={(e) => (e.currentTarget.style.color = 'var(--text-secondary)')}>
              {label}
            </a>
          ))}
        </nav>
      </div>
    </header>
  );
}

/* ===== Hero ===== */
function Hero() {

      <div className="max-w-[1180px] mx-auto px-6 md:px-10">

          <span className="line-up block text-[36px] sm:text-[48px] md:text-[64px] lg:text-[72px]" style={{ animationDelay: '120ms' }}>

          <span className="line-up block text-[36px] sm:text-[48px] md:text-[64px] lg:text-[72px]" style={{ animationDelay: '320ms' }}>

/* ===== About ===== */

          <div className="md:col-span-5">

              기획자–엔지니어 사이의 정보 병목을 없애고, 기술적 실현 가능성과 비즈니스 가치를 동시에 고려해 가장 빠른 속도로 제품 진화를 가능하게 합니다.

/* ===== Career ===== */

/* ===== ROLE Section (4-card chip grid) ===== */
function RoleSection({ items }) {
  return (
    <div className="mt-10">
      <div className="mono text-[11px] uppercase tracking-[0.12em] mb-4" style={{ color: 'var(--text-tertiary)' }}>Role · 담당 역할</div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {items.map((r, i) => (
          <div key={i} className="role-card">

/* ===== Workflow Diagram ===== */
function WorkflowDiagram() {
  const W = 1100, H = 760;
  const N = { w: 168, h: 56 };
  const SN = { w: 168, h: 44 };
  const l1Y = 28;
  const l1Items = ['사용자 입력 대기', '대화 이력 조회', '업로드 파일 확인', 'LLM 호출', '의도 분기'];
  const l1StartX = 24;
  const l1Gap = (W - 24 * 2 - N.w * 5) / 4;
  const l1Xs = l1Items.map((_, i) => l1StartX + i * (N.w + l1Gap));
  const l2BranchY = 168, l2NodeY = 196;
  const branches = [
    { key: 'Error',     desc: '파일 처리 오류' },
    { key: 'Translate', desc: '번역 요청 언어 지정 여부 확인' },
    { key: 'Review',    desc: '지표 점수·개선점 출력' },
    { key: 'Document',  desc: '파일 기반 Q&A 응답' },
    { key: 'etc',       desc: '지원 범위 외 처리 불가' },
  ];
  const colCount = branches.length;
  const colW = (W - 24 * 2) / colCount;
  const colCenters = branches.map((_, i) => 24 + colW * i + colW / 2);
  const translateCenterX = colCenters[1];
  const l3Y = 320, l3SubY = 348;
  const l3 = [
    { key: 'Fail',    desc: '추가 정보 요청',   x: translateCenterX - 110 },
    { key: 'Success', desc: '파일 확장자 확인', x: translateCenterX + 110 },
  ];
  const l4ParentX = translateCenterX + 110;
  const l4Y = 472, l4SubY = 500;
  const l4 = [
    { key: 'Extension Error', desc: '미지원 파일 확장자', x: l4ParentX - 200 },
    { key: 'Success',         desc: '번역 API 호출',     x: l4ParentX },
    { key: 'Exception',       desc: '번역 서버 응답 오류', x: l4ParentX + 200 },
  ];
  const l5Y = 624, l5X = l4ParentX;
  const nodeRect = (cx, cy, w = N.w, h = N.h) => ({ x: cx - w / 2, y: cy - h / 2, w, h });
  const l1Rects = l1Xs.map((x) => ({ x, y: l1Y, w: N.w, h: N.h }));
  const l1LastCx = l1Rects[4].x + N.w / 2;
  const l1LastCy = l1Rects[4].y + N.h;
  const l2Rects = colCenters.map((cx) => nodeRect(cx, l2NodeY + SN.h / 2, SN.w, SN.h));
  const lineColor = '#D9D7D1';
  return (
    <div className="rounded-[12px] overflow-hidden" style={{ background: 'var(--soft)', border: '1px solid var(--border)' }}>
      <div className="hidden md:block">
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: 'block' }}>
          {l1Rects.slice(0, -1).map((r, i) => {
            const next = l1Rects[i + 1];
            return <line key={`l1c-${i}`} x1={r.x + r.w} y1={r.y + r.h / 2} x2={next.x} y2={r.y + r.h / 2} stroke={lineColor} strokeWidth="1" />;
          })}

/* ===== Structured Case Study (editorial layout) ===== */
function StructuredCaseStudy({ id, label, summary, problemRows, problemNote, approach, executionSteps, resultBullets, validation }) {
  return (
    <div id={id} className="card-hover rounded-[12px]" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>

            <span className="cs-num">01</span>
            <span className="cs-label">Problem · 문제 정의</span>

              {problemRows.map((row, i) => (

          </div>
          <div>
            <span className="cs-num">02</span>
            <span className="cs-label">Approach · 접근 방식</span>
            <p className="cs-approach">{approach}</p>

          <div>
            <span className="cs-num">03</span>
            <span className="cs-label">Execution · 실행</span>
            <div>
              {executionSteps.map((s, i) => (

                  </div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <span className="cs-num">04</span>
            <span className="cs-label">Result · 결과</span>
            <ul className="cs-result">
              {resultBullets.map((r, i) => (
                <li key={i}><span style={{ textWrap: 'pretty' }}>{r}</span></li>
              ))}
            </ul>
          </div>

          {validation && (
            <div>
              <span className="cs-num">05</span>
              <span className="cs-label">Validation · 검증 결과</span>
              {validation}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
