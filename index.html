<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jieon Sim · Portfolio</title>
<meta name="description" content="Jieon Sim — Prompt Engineer · Problem Solver. CS 6년의 사용자 이해를 AI Agent 기획·설계·구현으로 옮기는 사람." />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231C1B1A'/><circle cx='16' cy='16' r='3' fill='white'/></svg>" />

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Pretendard', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
        },
      },
    },
  };
</script>

<style>
  :root {
    --bg:        #FAF9F6;
    --bg-warm:   #F4F2EC;
    --surface:   #FFFFFF;
    --soft:      #F4F2EC;
    --softer:    #EFEDE5;
    --border:        #E5E2D9;
    --border-strong: #D4D0C3;
    --text-primary:   #1A1917;
    --text-secondary: #5E5A52;
    --text-tertiary:  #9C9789;
    --accent:      #7D6F5A;
    --accent-soft: #EBE5D6;
    --accent-ink:  #4F4534;
    --accent-warm: #B89B6E;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text-primary); }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
    overflow-x: hidden;
  }
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
  .display { font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-feature-settings: "ss01"; }

  /* ===== Animations ===== */
  @keyframes lineUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .line-up { opacity: 0; animation: lineUp 800ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-in { opacity: 0; animation: fadeIn 1200ms ease-out forwards; }

  /* Scroll-reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 800ms cubic-bezier(0.22, 1, 0.36, 1), transform 800ms cubic-bezier(0.22, 1, 0.36, 1); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }

  /* Hover */
  .card-hover { transition: border-color 220ms ease-out, transform 220ms ease-out, box-shadow 220ms ease-out; }
  .card-hover:hover { border-color: var(--accent); }
  .lift-hover { transition: transform 240ms ease-out, border-color 240ms ease-out, box-shadow 240ms ease-out; }
  .lift-hover:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 8px 24px -16px rgba(28,27,26,0.18); }

  /* ===== Hero grid backdrop ===== */
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(125,111,90,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(125,111,90,0.06) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,0,0,0.7) 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,0,0,0.7) 0%, transparent 80%);
    pointer-events: none;
  }

  /* ===== Section index (right rail) ===== */
  .rail-link { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 0; }
  .rail-line { display: block; width: 24px; height: 1px; background: var(--border-strong); transition: width 240ms ease, background 240ms ease; }
  .rail-label { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); transition: color 240ms ease; }
  .rail-link:hover .rail-line, .rail-link.active .rail-line { width: 36px; background: var(--accent); }
  .rail-link:hover .rail-label, .rail-link.active .rail-label { color: var(--text-primary); }
  .rail-link.active .rail-label { font-weight: 600; }

  /* ===== Workflow Diagram ===== */
  .wf-node-inner {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color 200ms ease-out;
    line-height: 1.35;
  }
  .wf-node-inner:hover { border-color: var(--border-strong); }
  .wf-node-inner.dark { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  .wf-title { font-weight: 600; font-size: 13px; color: var(--text-primary); }
  .wf-sub   { font-size: 12px; color: var(--text-tertiary); }

  .quote-accent { border-left: 3px solid var(--accent); padding-left: 24px; }

  .nav-scrolled {
    background: rgba(250, 249, 246, 0.82);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid var(--border);
  }

  ::selection { background: var(--accent); color: #fff; }
  section[id] { scroll-margin-top: 80px; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  /* ===== Hero meta card ===== */
  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 24px;
    box-shadow: 0 1px 0 rgba(28,27,26,0.02), 0 12px 32px -24px rgba(28,27,26,0.18);
  }
  .meta-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 16px;
    align-items: baseline;
    padding: 14px 0;
    border-top: 1px solid var(--border);
  }
  .meta-row:first-of-type { border-top: 0; padding-top: 0; }
  .meta-label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); }
  .meta-value { font-size: 14.5px; color: var(--text-primary); line-height: 1.55; }

  /* Section header */
  .section-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .section-eyebrow::before {
    content: ''; display: inline-block; width: 24px; height: 1px; background: var(--accent);
  }
  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  /* Case study */
  .cs-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500; font-size: 13px; letter-spacing: 0.18em;
    line-height: 1; color: var(--accent); font-variant-numeric: tabular-nums;
    display: block; margin-bottom: 12px;
    text-transform: uppercase;
  }
  .cs-label {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500; font-size: 10.5px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--text-tertiary);
    display: block; margin-bottom: 22px;
  }
  .cs-approach {
    font-size: 15.5px; line-height: 1.78; color: var(--text-primary);
    max-width: 760px; text-wrap: pretty; white-space: pre-line;
  }
  .cs-result { display: flex; flex-direction: column; gap: 12px; }
  .cs-result li {
    font-size: 15px; line-height: 1.78; color: var(--text-primary);
    display: flex; gap: 14px; align-items: flex-start;
  }
  .cs-result li::before {
    content: ''; flex-shrink: 0; width: 5px; height: 5px;
    margin-top: 11px; border-radius: 999px; background: var(--accent);
  }

  /* label/value rows */
  .lv-row { display: grid; grid-template-columns: 130px 1fr; gap: 16px; align-items: baseline; padding: 10px 0; }
  .lv-row + .lv-row { border-top: 1px dashed var(--border); }
  .lv-row .lv-label { font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  .lv-row .lv-value { color: var(--text-primary); font-size: 15px; line-height: 1.65; }
  @media (max-width: 640px) {
    .lv-row { grid-template-columns: 1fr; gap: 4px; padding: 6px 0; }
  }

  /* numbered steps */
  .step-row { display: grid; grid-template-columns: 36px 1fr; gap: 16px; align-items: baseline; }
  .step-row + .step-row { margin-top: 22px; }
  .step-row .step-num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-tertiary);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.10em;
    line-height: 1.5;
    font-variant-numeric: tabular-nums;
    padding-top: 1px;
  }
  .step-row .step-title { font-size: 15.5px; font-weight: 600; color: var(--text-primary); line-height: 1.45; letter-spacing: -0.005em; }
  .step-row .step-desc  { font-size: 14px; color: var(--text-secondary); margin-top: 4px; line-height: 1.7; }

  /* ROLE chip card */
  .role-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 22px 24px;
    transition: border-color 200ms ease-out, transform 200ms ease-out, box-shadow 200ms ease-out;
    position: relative;
    overflow: hidden;
  }
  .role-card::before {
    content: ''; position: absolute; top: 0; left: 0; height: 2px; width: 0;
    background: var(--accent); transition: width 320ms ease;
  }
  .role-card:hover { border-color: var(--accent-warm); transform: translateY(-1px); }
  .role-card:hover::before { width: 100%; }
  .role-card .role-num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent); font-weight: 500; font-size: 11px; letter-spacing: 0.14em; margin-bottom: 14px; display: block;
  }
  .role-card .role-title { color: var(--text-primary); font-size: 15px; font-weight: 600; line-height: 1.4; letter-spacing: -0.005em; }
  .role-card .role-sep { width: 28px; height: 1px; background: var(--border-strong); margin: 14px 0; }
  .role-card .role-desc { color: var(--text-secondary); font-size: 13.5px; line-height: 1.65; }

  .kw-chip {
    display: inline-block;
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Project hero */
  .project-hero {
    position: relative;
    border-radius: 16px;
    background: linear-gradient(180deg, var(--soft) 0%, var(--bg) 100%);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .project-hero::before {
    content: ''; position: absolute; top: 0; right: 0; width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(184,155,110,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .project-num-big {
    font-family: 'Instrument Serif', 'Times New Roman', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: 112px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--accent);
    opacity: 0.95;
    font-variant-numeric: tabular-nums;
  }
  @media (min-width: 768px) { .project-num-big { font-size: 160px; } }

  /* Sub-project chip */
  .sub-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    background: var(--surface);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .sub-chip .dot { width: 5px; height: 5px; border-radius: 999px; background: var(--accent); }
  .sub-chip.lead { background: var(--text-primary); border-color: var(--text-primary); color: #fff; }
  .sub-chip.lead .dot { background: var(--accent-warm); }

  /* Hero name display */
  .hero-name {
    font-family: 'Pretendard', 'Inter', system-ui, sans-serif;
    font-weight: 800;
    letter-spacing: -0.045em;
  }
  .accent-text { color: var(--accent); font-weight: 700; }

  /* Pulse dot */
  .pulse-dot { position: relative; width: 8px; height: 8px; border-radius: 999px; background: #5BA88B; display: inline-block; }
  .pulse-dot::after {
    content: ''; position: absolute; inset: 0; border-radius: 999px; background: #5BA88B;
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.6); opacity: 0; }
  }

  @media (max-width: 640px) {
    .nav-links a { font-size: 12px; }
  }

  /* Print */
  @media print {
    .rail, header, .no-print { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" src="components/foundations.jsx"></script>
<script type="text/babel" data-presets="react" src="components/sections.jsx"></script>
<script type="text/babel" data-presets="react" src="components/projects.jsx"></script>
<script type="text/babel" data-presets="react" src="components/app.jsx"></script>

</body>
</html>
